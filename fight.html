  <body>
    <div id="unicorn-display"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="https://cdn.pixelplush.dev/maze/web/maze.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      window.WebFontConfig = {
          custom: {
              families: ['Pixeltype']
          },
          active() {
              CreateGame();
          },
      };

      /* eslint-disable */
      // include the web-font loader script
      (function() {
          const wf = document.createElement('script');
          wf.src = `${document.location.protocol === 'https:' ? 'https' : 'http'
          }://ajax.googleapis.com/ajax/libs/webfont/1/webfont.js`;
          wf.type = 'text/javascript';
          wf.async = 'true';
          const s = document.getElementsByTagName('script')[0];
          s.parentNode.insertBefore(wf, s);
      }());
      /* eslint-enabled */

      let playerInfo = {}; // This player's info
      let gameData = {};
      let gameState = {};
      let socket = null;
      const snowballCooldown = 500;
      let snowballTimer = 0;
      let counter = 0;

      var animations = [ "front", "back", "left", "right" ];
      var characters = {
        "elf": "elf",
        "elfgirl": "elfgirl",
        "santa": "santa",
        "claus": "claus",
        "grinch": "grinch",
        "maaya": "maaya",
        "instafluff": "instafluff",
        "avellana": "avellana",
        "jimmy": "jimmy",
      };

      function explodeSnow( x, y ) {
        counter++;
        Unicorn.AddParticles( "snowplosion_" + counter, {
          shape: "circle", // "cone", "line"
          // startColor: "#88ff00",
          // endColor: "#ff0088",
          startColor: "#ffffff",
          endColor: "#ffffff",
          intensity: 10, // Scale from 1 - 10
          minSpeed: 0.1,
          maxSpeed: 0.25,
          decay: 1, // Scale from 0 - 10
        }, x, y );

        stopParticles( "snowplosion_" + counter, 250 );
      }

      function stopParticles( name, time = 1000 ) {
        setTimeout( () => {
          Unicorn.RemoveParticles( name );
        }, time );
      }

      function Init() {
        // Add Initialization Here
        PIXI.settings.SCALE_MODE = PIXI.SCALE_MODES.NEAREST;
        Unicorn.Load( "map", `assets/bcg.png` );
        if( !params.get( "overlay" ) ) {
          var map = Unicorn.AddObject( "map", {
            type: "rectangle",
            x: Math.floor( 1920 / 2 ), y: Math.floor( 1080 / 2 ) - 9,
            width: 1920, height: 1080,
            sprite: "map",
            isStatic: true
          } );
          map.sprite.scale.x = 3;
          map.sprite.scale.y = 3;
        }

        Unicorn.Load( "target_big", `assets/target_large.png` );
        var target = Unicorn.AddObject( "target_big", {
          type: "circle",
          x: 200, y: 100,
          radius: 48,
          sprite: "target_big",
          isStatic: true
        });
        target.sprite.scale.x = 3;
        target.sprite.scale.y = 3;

        Unicorn.Load( "target_medium", `assets/target_medium.png` );
        target = Unicorn.AddObject( "target_medium", {
          type: "circle",
          x: 600, y: 100,
          radius: 32,
          sprite: "target_medium",
          isStatic: true
        });
        target.sprite.scale.x = 3;
        target.sprite.scale.y = 3;

        Unicorn.Load( "target_small", `assets/target_small.png` );
        target = Unicorn.AddObject( "target_small", {
          type: "circle",
          x: 900, y: 100,
          radius: 16,
          sprite: "target_small",
          isStatic: true
        });
        target.sprite.scale.x = 3;
        target.sprite.scale.y = 3;

        for( var c in characters ) {
          animations.forEach( a => {
            var name = characters[ c ] + "_" + a;
            for( var i = 1; i < 11; i++ ) {
              Unicorn.Load( name + ( i - 1 ), `assets/${c}/${name}/${name}${i}.png` );
            }
          });
        }

        Unicorn.Load( "snowball", "assets/snowball1.png" );

        if( !params.get( "overlay" ) ) {
          // Start snow
          Unicorn.AddParticles( "snowupdown", {
            blendMode: PIXI.BLEND_MODES.DEFAULT,
            shape: "line", // "cone", "line"
            // lineDirection: 0,
            // length: 400,
            angle: Math.PI / 2,
            // startColor: "#88ff00",
            // endColor: "#ff0088",
            startColor: "#ffffff",
            endColor: "#ffffff",
            intensity: 2, // Scale from 1 - 10
            minSpeed: 0.05,
            maxSpeed: 0.2,
            decay: 15, // Scale from 0 - 10
          }, 0, -200);
        }

        document.addEventListener( "keydown", onKeyDown, false );
        document.addEventListener( "keyup", onKeyUp, false );
      }

      function Update( timestamp, timeDiffInMs ) {
        // Update
        // Tap to move to a coordinate
        // Hold to make snowball
        // Swipe to throw snowball

        if( snowballTimer > 0 ) {
          snowballTimer -= timeDiffInMs;
        }

        for( var player in players ) {
          var p = players[ player ];

          Unicorn.SetPosition( p.sprite.label, p.x, p.y );
          p.sprite.sprite.zIndex = p.sprite.position.y;
          p.label.x = p.sprite.position.x;
          if( p.label.x < 50 ) {
             p.label.x += 50;
          }
          p.label.y = p.sprite.position.y - 60;
          if( p.label.y < 60 ) {
             p.label.y += 60;
          }
          p.label.anchor.set( 0.5 );
        }
        for( var ball in snowballs ) {
          var b = snowballs[ ball ];
          Unicorn.SetPosition( b.sprite.label, b.x, b.y );
          b.sprite.sprite.zIndex = b.sprite.position.y;
        }
      }

      let keystate = {};
      function onKeyDown( event ) {
        switch( event.keyCode ) {
          case 87: // W
          case 38: // Up
            keystate[ "up" ] = true;
            break;
          case 83: // S
          case 40: // Down
            keystate[ "down" ] = true;
            break;
          case 65: // A
          case 37: // Left
            keystate[ "left" ] = true;
            break;
          case 68: // D
          case 39: // Right
            keystate[ "right" ] = true;
            break;
          case 70: // F
          case 32: // Space
            keystate[ "space" ] = true;
            break;
          default:
            break;
        }
        // console.log( keystate );
        setPlayerState( playerInfo.id, keysToPlayerState( keystate ) );
        // event.preventDefault();
      }

      function onKeyUp( event ) {
        switch( event.keyCode ) {
          case 87: // W
          case 38: // Up
            keystate[ "up" ] = false;
            break;
          case 83: // S
          case 40: // Down
            keystate[ "down" ] = false;
            break;
          case 65: // A
          case 37: // Left
            keystate[ "left" ] = false;
            break;
          case 68: // D
          case 39: // Right
            keystate[ "right" ] = false;
            break;
          case 70: // F
          case 32: // Space
            keystate[ "space" ] = false;
            break;
          default:
            break;
        }
        // console.log( keystate );
        setPlayerState( playerInfo.id, keysToPlayerState( keystate ) );
        // event.preventDefault();
      }

      function keysToPlayerState( keys ) {
        if( keystate[ "space" ] ) {
          return "throw";
        }
        else if( keystate[ "up" ] ) {
          return "up";
        }
        else if( keystate[ "down" ] ) {
          return "down";
        }
        else if( keystate[ "left" ] ) {
          return "left";
        }
        else if( keystate[ "right" ] ) {
          return "right";
        }
        else {
          return "stay";
        }
      }

      let players = {};
      let snowballs = {};
      const playerStates = {
        "stay": 0x00,
        "left": 0x01,
        "right": 0x02,
        "up": 0x04,
        "down": 0x08,
        "snowball": 0x10,
        "throw": 0x20,
      };

      function setPlayerState( playerId, state ) {
        if( gameState.players[ playerId ].state !== playerStates[ state ] ) {
          socket.emit( "action", { action: "move", playerId: playerInfo.id, data: {
            state: playerStates[ state ]
          } } );
          if( state === "throw" && snowballTimer <= 0 ) {
            snowballTimer = snowballCooldown;
            let angle = 0;
            switch( gameState.players[ playerId ].dir ) {
              case 0:
                angle = Math.PI / 2;
                break;
              case 1:
                angle = Math.PI;
                break;
              case 2:
                angle = 0;
                break;
              case 3:
                angle = -Math.PI / 2;
                break;
            }
            socket.emit( "action", { action: "throw", playerId: playerInfo.id, data: {
              angle: angle
            } } );
          }
          gameState.players[ playerId ].state = playerStates[ state ];
        }
      }

      function removePlayer( playerId ) {
        if( players[ playerId ] ) {
          Unicorn.RemoveObject( "player_" + playerId );
          Unicorn.RemoveText( "playerLabel_" + playerId );
          delete players[ playerId ];
        }
      }

      function setPlayer( playerId, x, y, dir, name, character = "elf" ) {
        if( !characters[ character ] ) {
          character = "elf";
        }
        if( players[ playerId ] ) {
          if( params.get( "overlay" ) && playerId === playerInfo.id ) {
            x = -1000;
            y = -1000;
          }

          // Move the player sprite to coord
          players[ playerId ].x = x;
          players[ playerId ].y = y;

          var direction = "front";
          switch( dir ) {
            case 0:
              direction = "front";
              break;
            case 1:
              direction = "left";
              break;
            case 2:
              direction = "right";
              break;
            case 3:
              direction = "back";
              break;
          }
          // p.frameTime += timeDiffInMs;
          // if( p.frameTime > 1000 / 10 ) {
          //   p.frameTime = 0;
            // players[ playerId ].frame = ( players[ playerId ].frame + 1 ) % 10;
            // console.log( player, p.frame );
            var frameName = characters[ players[ playerId ].character ] + "_" + direction + players[ playerId ].frame;
            // console.log( p.sprite );
            // console.log( assetReference[ frameName ] );
            players[ playerId ].sprite.sprite.texture = assetReference[ frameName ];
          // }
        }
        else {
          // Add player
          var sprite = character + "_" + "front1";
          let pSprite = Unicorn.AddObject( "player_" + playerId, {
            type: "circle",
            sprite: sprite,
            x: -1000, y: -1000,
            radius: 24,
            isStatic: true
          } );
          pSprite.sprite.scale.x = 3;
          pSprite.sprite.scale.y = 3;
          players[ playerId ] = {
            name: name,
            x: x, y: y,
            progress: 1,
            path: [],
            points: 0,
            label: Unicorn.AddText( "playerLabel_" + playerId, name, -1000, -1000, {
              fontFamily: 'Pixeltype',
              fontSize: 40,
              fontWeight: 'bold',
              fill: "#2E84D9",
            } ),
            sprite: pSprite,
            character: character,
            frame: 0,
            frameTime: 0,
          };
        }
      }

      function removeSnowball( snowballId ) {
        if( snowballs[ snowballId ] ) {
          Unicorn.RemoveObject( "snowball_" + snowballId );
          delete snowballs[ snowballId ];
        }
      }

      function setSnowball( snowballId, x, y, explode = false ) {
        if( snowballs[ snowballId ] ) {
          // Move the snowball sprite to coord
          // console.log( gameState.snowballs[ snowballId ].life );
          // console.log( snowballs[ snowballId ].sprite.sprite.scale );
          let scale = 2 + Math.sin( gameState.snowballs[ snowballId ].life / 1500 * Math.PI );
          let offset = 5 + Math.sin( gameState.snowballs[ snowballId ].life / 1500 * Math.PI ) * -15;
          // console.log( scale );
          snowballs[ snowballId ].x = x;
          snowballs[ snowballId ].y = y + offset;
          snowballs[ snowballId ].sprite.sprite.scale.x = scale;
          snowballs[ snowballId ].sprite.sprite.scale.y = scale;
          if( explode ) {
            explodeSnow( x, y );
          }
        }
        else {
          // Add snowball
          let pSprite = Unicorn.AddObject( "snowball_" + snowballId, {
            type: "circle",
            sprite: "snowball",
            x: -1000, y: -1000,
            radius: 14,
            isStatic: true
          } );
          pSprite.sprite.scale.x = 2;//3;
          pSprite.sprite.scale.y = 2;//3;
          snowballs[ snowballId ] = {
            x: x, y: y + 5,
            sprite: pSprite,
            frame: 0,
            frameTime: 0,
          };
        }
      }

      function CreateGame() {
        Unicorn.Create( "unicorn-display", {
          width: 1920,
          height: 1080,
          // background: "#777777",// "transparent",
          background: "transparent",
          init: Init,
          update: Update,
          channel: "",
          username: undefined,
          password: undefined,
          onCommand: null,
          onChat: null,
          gravity: { x: 0, y: 0 }
        });

        socket = io( "http://localhost:4567", {// "https://blockparty.instafluff.tv:3000", {
          query: {
            name: params.get( "name" ) || generateName(),
            character: params.get( "character" ) || "elf",
            room: "snowbox"
          }
        } );
        socket.on( "connect", () => {
          // Reset everything
          playerInfo = {};
          gameData = {};
          gameState = {};
          for( let player in players ) {
            removePlayer( player );
          }
          for( let ball in snowballs ) {
            removeSnowball( ball );
          }
        });
        socket.on( "id", ( data ) => {
          playerInfo = data;
          console.log( playerInfo );
        });
        socket.on( "sync", ( data ) => {
          console.log( "sync", data );
          gameData = data;
        });
        socket.on( "data", ( data ) => {
          console.log( "data", data );
          gameData = Object.assign( gameData, data );
          // Remove empty data
          Object.keys( gameData ).forEach( k => {
            if( !gameData[ k ] ) {
              delete gameData[ k ];
              removePlayer( k );
            }
          });
        });
        socket.on( "state", ( data ) => {
          // console.log( "state", data );
          gameState = data;
          if( gameState.players ) {
            for( var player in gameState.players ) {
              var p = gameState.players[ player ];
              setPlayer( player, p.x, p.y, p.dir, gameData[ player ].name, gameData[ player ].character );
            }
          }
          // console.log( gameState );
          if( gameState.snowballs ) {
            for( var ball in gameState.snowballs ) {
              var b = gameState.snowballs[ ball ];
              setSnowball( ball, b.x, b.y, b.explode );
            }
            // Remove gone snowballs
            Object.keys( snowballs ).forEach( k => {
              if( !gameState.snowballs[ k ] ) {
                removeSnowball( k );
              }
            });
          }
        });
      }

      // -- Random Name Generator for Javascript --
      // (c) by Thomas Konings (https://gist.github.com/tkon99/4c98af713acc73bed74c)
      function capFirst(string) {
          return string.charAt(0).toUpperCase() + string.slice(1);
      }

      function getRandomInt(min, max) {
        	return Math.floor(Math.random() * (max - min)) + min;
      }
